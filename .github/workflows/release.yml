name: Release Skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare tag release
        id: release
        run: |
          python .github/scripts/extract_latest_release_notes.py CHANGELOG.md release-notes.md --tag "${GITHUB_REF_NAME}" --plugin-json .codex-plugin/plugin.json

      - name: Commit release metadata
        if: steps.release.outputs.changelog_changed == 'true' || steps.release.outputs.plugin_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .codex-plugin/plugin.json
          git diff --cached --quiet || git commit -m "chore: sync release metadata ${GITHUB_REF_NAME} [skip ci]"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Build release archive
        run: |
          rm -rf skills-package plugin-package Gei-skills.zip Gei-codex-plugin.zip
          mkdir -p skills-package/Gei
          cp -R skills/. skills-package/Gei/
          cd skills-package
          zip -r ../Gei-skills.zip .
          cd ..
          mkdir -p plugin-package/gei
          cp -R .codex-plugin skills docs README.md CHANGELOG.md plugin-package/gei/
          cd plugin-package
          zip -r ../Gei-codex-plugin.zip gei

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s release-notes.md ]; then
            gh release create "${GITHUB_REF_NAME}" Gei-skills.zip Gei-codex-plugin.zip \
              --generate-notes \
              --notes "$(cat release-notes.md)"
          else
            gh release create "${GITHUB_REF_NAME}" Gei-skills.zip Gei-codex-plugin.zip \
              --generate-notes
          fi
