name: Release Skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release archive
        run: |
          rm -rf package Gei.zip
          mkdir -p package
          cp -R skills/. package/
          cd package
          zip -r ../Gei.zip .

      - name: Extract README release notes
        run: |
          python .github/scripts/extract_latest_release_notes.py README.md release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" Gei.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --generate-notes
